<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; connect-src 'self' https://ipinfo.io;" />
    <link rel="stylesheet" href="index.css" />
    <script src="index.js" defer></script>
    <title>Hello World</title>
  </head>
  <body>
    <div>
      <button id="helloButton">Hello?</button>
    </div>
    <div id="status">
      <p>
        <span id="app-name"></span>
        <span id="app-version"></span>
        <a id='update'></a>
      </p>
      <p>
        running on electron <span id="electron-version"></span>,
        node.js <span id="node-version"></span>,
        and chromium <span id="chrome-version"></span>.
      </p>
    </div>
    <div id="popup">
      <section>
        <h1>Hello?</h1>
        <p>Hello World!</p>
        <p>your ip is <span id="ipAddress"></span><br><span id="location"></span></p>
        <button>Dismiss</button>
      </section>
    </div>
  </body>
</html>
