name: Build
on:
  - push
  - pull_request
  - workflow_dispatch
jobs:
  build:
    name: Build
    runs-on: windows-2022
    steps:
      - name: Configure git
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v7
      - name: Setup node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
      - name: Setup msys2
        uses: msys2/setup-msys2@v2
        with:
          install: make tar zip unzip
          path-type: inherit
      - name: Whoami
        run: whoami -all
      - name: Build
        run: msys2 ./.github/workflows/build.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          if-no-files-found: error
          path: |
            example-code-signing*
            dist/*.exe
            dist/*.msi
